<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="bg-light">

<div class="container-fluid">
<div class="row">

<div class="col-md-2 sticky-sidebar sticky-top">
    <h4>SarkariSahayata</h4>
    <a href="{{ url_for('admin.info_dashboard')}}">Dashboard</a>
    <a href="{{ url_for('admin.admin_dashboard')}}">Manage Schemes</a>
    <a href="{{ url_for('admin.view_user')}}">View Users</a>
    <a href="{{ url_for('home.index')}}">Homepage</a>
</div>

<div class="col-md-10 dashboard-content">
    <h2 class="page-title">User</h2>

    
    <div class="card shadow-sm border-0"></div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="usersTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>user_type</th>
                        </tr>
                    </thead>
                    <tbody>
                    {% for user in users %}
                        <tr>
                            <td>{{user.username}}</td>
                            <td>{{user.email}}</td>
                            <td>{{user.user_type}}</td>
                        {% if g.user['user_type'] == 'master' %}
                            <td>
                                <div class="dropdown">
                                    <button class="btn btn-sm btn-light" type="button" data-bs-toggle="dropdown">
                                        ⋮
                                    </button>
                                    <ul class="dropdown-menu">
                                        <li><a class="dropdown-item" href="#{{user.username}}">change role</a></li>
                                    </ul>
                                </div>
                            </td>
                        {% endif %}
                        </tr>    
                    {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
