<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="bg-light">

<div class="container-fluid">
<div class="row">

<div class="col-md-2 sticky-sidebar sticky-top">
    <h4>SarkariSahayata</h4>
    <a href="{{ url_for('admin.info_dashboard')}}">Dashboard</a>
    <a href="{{ url_for('admin.admin_dashboard')}}">Manage Schemes</a>
    <a href="{{ url_for('admin.view_user')}}">View Users</a>
    <a href="{{ url_for('home.index')}}">Homepage</a>
</div>

<div class="col-md-10 dashboard-content">
    <h2 class="page-title">Admin Dashboard</h2>

    <!-- Top Statistics Cards -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="text-muted">Total Users Registered</h6>
                    <h3 class="fw-bold">{{registrations}}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="text-muted">Users Given Information</h6>
                    <h3 class="fw-bold">{{info}}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="text-muted">Total Schemes Integrated</h6>
                    <h3 class="fw-bold">{{total_schemes}}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="text-muted">Categories</h6>
                    <h3 class="fw-bold">6</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Section -->
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title">Gender Distribution</h5>
                    <canvas id="genderChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title">Schemes per Category</h5>
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
</div>

<script>
    // Gender Chart
    const data3 = {{ gender_data|tojson }}
    const genderCtx = document.getElementById('genderChart');
    new Chart(genderCtx, {
        type: 'pie',
        data: {
            labels: ['Male', 'Female'],
            datasets: [{
                data: data3,
                backgroundColor: ['#0d6efd', '#dc3545']
            }]
        }
    });

    // Schemes per Category Chart
    const data4 = {{cat_list|tojson}}
    const categoryCtx = document.getElementById('categoryChart');
    new Chart(categoryCtx, {
        type: 'bar',
        data: {
            labels: ['Education', 'Health', 'Agriculture', 'Employment', 'Housing', 'Women & Child'],
            datasets: [{
                label: 'Number of Schemes',
                data: data4,
                backgroundColor: '#198754'
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            }
        }
    });
</script>

</body>
</html>
