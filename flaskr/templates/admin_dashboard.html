<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - SarkariSahayata</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
.admin-lang-btn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:1000;
  display:flex;
  align-items:center;
  gap:8px;
  border:1px solid #dbeafe;
  background:#eff6ff;
  color:#1d4ed8;
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>

<body>

<button type="button" class="admin-lang-btn" id="openLanguageModal">
  <i class="bi bi-translate"></i>
  <span data-i18n="choose_language">Choose Language</span>
</button>

<div class="container-fluid">
<div class="row">

<div class="col-md-2 sticky-sidebar sticky-top">
    <h4 data-i18n="site_title">SarkariSahayata</h4>
    <a href="{{ url_for('admin.info_dashboard')}}" data-i18n="dashboard">Dashboard</a>
    <a href="{{ url_for('admin.admin_dashboard')}}" data-i18n="manage_schemes">Manage Schemes</a>
    <a href="{{ url_for('admin.view_user')}}" data-i18n="view_users">View Users</a>
    <a href="{{ url_for('home.index')}}" data-i18n="homepage">Homepage</a>
</div>

<div class="col-md-10 dashboard-content">

<h2 class="page-title" data-i18n="add_new_scheme">Add New Scheme</h2>

<form method="POST">

<div class="card-section">
<h5 data-i18n="basic_information">Basic Information</h5>
<input type="text" name="title" class="form-control mb-3" placeholder="Scheme Title" data-i18n-placeholder="scheme_title" required>

<select name="category" class="form-select" required>
<option value="" data-i18n="select_category">Select Category</option>
<option>Agriculture</option>
<option>Education</option>
<option>Health</option>
<option>Housing</option>
<option>Skills and Employment</option>
<option>Women and Child</option>
<option>Transport</option>
</select>
</div>

<div class="card-section">
<h5 data-i18n="scheme_description">Scheme Description</h5>
<textarea name="description" rows="4" class="form-control"></textarea>
</div>

<div class="card-section">
<h5 data-i18n="benefits_objectives">Benefits & Objectives</h5>
<textarea name="benefits" rows="3" class="form-control mb-3"></textarea>
<textarea name="objectives" rows="3" class="form-control"></textarea>
</div>

<div class="card-section">
<h5 data-i18n="eligibility_criteria">Eligibility Criteria</h5>
<div class="row g-3">
<div class="col-md-4">
<input type="number" name="min_age" class="form-control" placeholder="Min Age" data-i18n-placeholder="min_age">
</div>
<div class="col-md-4">
<input type="number" name="max_age" class="form-control" placeholder="Max Age" data-i18n-placeholder="max_age">
</div>
<div class="col-md-4">
<input type="number" name="max_income" class="form-control" placeholder="Max Income" data-i18n-placeholder="max_income">
</div>

<div class="col-md-4">
<select name="gender" class="form-select">
<option value="" data-i18n="gender_any">Gender (Any)</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="col-md-4">
<select name="caste" class="form-select">
<option value="" data-i18n="caste_any">Caste (Any)</option>
<option>General</option>
<option>OBC</option>
<option>SC</option>
<option>ST</option>
<option>Other</option>
</select>
</div>

<div class="col-md-4">
<input type="text" name="occupation" class="form-control" placeholder="Occupation" data-i18n-placeholder="occupation">
</div>
</div>
</div>

<div class="card-section">
<h5 data-i18n="application_documents">Application & Documents</h5>
<textarea name="application_process" rows="3" class="form-control mb-3"></textarea>
<textarea name="documents" rows="3" class="form-control"></textarea>
</div>

<button type="submit" class="btn-save" data-i18n="save_scheme">Save Scheme</button>

</form>

</div>
</div>
</div>

<div class="lang-modal-overlay" id="langModalOverlay">
  <div class="lang-modal-box">
    <div class="lang-modal-header">
      <div>
        <h3 data-i18n="choose_language">Choose Language</h3>
        <p data-i18n="choose_language_sub">Select your preferred language for the portal</p>
      </div>
      <button class="lang-close-btn" id="closeLanguageModal">&times;</button>
    </div>

    <div class="lang-search-wrap">
      <i class="bi bi-search"></i>
      <input type="text" id="languageSearch" placeholder="Search language..." data-i18n-placeholder="search_language">
    </div>

    <div class="lang-grid" id="languageGrid">
      <button class="lang-option" data-lang="en">English</button>
      <button class="lang-option" data-lang="hi">हिंदी</button>
      <button class="lang-option" data-lang="mr">मराठी</button>
      <button class="lang-option" data-lang="gu">ગુજરાતી</button>
      <button class="lang-option" data-lang="bn">বাংলা</button>
      <button class="lang-option" data-lang="ta">தமிழ்</button>
      <button class="lang-option" data-lang="te">తెలుగు</button>
      <button class="lang-option" data-lang="kn">ಕನ್ನಡ</button>
      <button class="lang-option" data-lang="ml">മലയാളം</button>
      <button class="lang-option" data-lang="pa">ਪੰਜਾਬੀ</button>
      <button class="lang-option" data-lang="or">ଓଡ଼ିଆ</button>
      <button class="lang-option" data-lang="as">অসমীয়া</button>
      <button class="lang-option" data-lang="ur">اردو</button>
      <button class="lang-option" data-lang="ne">नेपाली</button>
      <button class="lang-option" data-lang="sa">संस्कृत</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
