<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Scheme — Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
<style>
  .sidebar-badge { font-size:10px; background:#f59e0b; color:#fff; border-radius:10px; padding:2px 7px; margin-left:6px; }
  .sidebar-role  { font-size:11px; color:#9ca3af; margin-top:4px; }
  .active-link   { background:#1d4ed8 !important; color:#fff !important; border-radius:6px; }
  .edit-header   { background:linear-gradient(90deg,#1e3a8a,#1d4ed8); color:#fff; border-radius:12px; padding:20px 28px; margin-bottom:28px; }
</style>
</head>
<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 sticky-sidebar sticky-top" style="min-height:100vh;">
  <div class="mb-3">
    <h4 style="font-size:16px;">🏛️ SarkariSahayata</h4>
    <div class="sidebar-role">👤 {{ admin_username }}
      <span class="sidebar-badge">{{ admin_role }}</span>
    </div>
  </div>
  <a href="{{ url_for('admin.info_dashboard') }}"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a href="{{ url_for('admin.admin_dashboard') }}" class="active-link"><i class="bi bi-list-ul"></i> Manage Schemes</a>
  <a href="{{ url_for('admin.view_user') }}"><i class="bi bi-people"></i> View Users</a>
  <a href="{{ url_for('admin.activity_log') }}"><i class="bi bi-journal-text"></i> Activity Log</a>
  <a href="{{ url_for('admin.export_schemes') }}" target="_blank"><i class="bi bi-download"></i> Export CSV</a>
  <a href="{{ url_for('home.index') }}"><i class="bi bi-house"></i> Homepage</a>
  <a href="{{ url_for('admin.admin_logout') }}" style="color:#f87171;margin-top:20px;border-top:1px solid #374151;padding-top:14px;">
    <i class="bi bi-box-arrow-right"></i> Logout
  </a>
</div>

<!-- MAIN -->
<div class="col-md-10 dashboard-content">

  <div class="edit-header">
    <h2 class="mb-1"><i class="bi bi-pencil-square"></i> Edit Scheme</h2>
    <p class="mb-0 opacity-75">Editing: <strong>{{ scheme.title }}</strong> &nbsp;|&nbsp; ID #{{ scheme.id }}</p>
  </div>

  <form method="POST">

    <div class="card-section">
      <h5><i class="bi bi-info-circle"></i> Basic Information</h5>
      <label class="form-label fw-semibold">Scheme Title <span class="text-danger">*</span></label>
      <input type="text" name="title" class="form-control mb-3"
             value="{{ scheme.title }}" required>

      <label class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
      <select name="category" class="form-select mb-3" required>
        {% for c in ["Agriculture","Education","Health","Housing","Skills and Employment","Women and Child","Transport"] %}
          <option {% if scheme.category == c %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
      </select>

      <label class="form-label fw-semibold">Description</label>
      <textarea name="description" rows="4" class="form-control">{{ scheme.description or '' }}</textarea>
    </div>

    <div class="card-section">
      <h5><i class="bi bi-award"></i> Benefits &amp; Objectives</h5>
      <label class="form-label fw-semibold">Benefits (one per line)</label>
      <textarea name="benefits" rows="4" class="form-control mb-3">{{ scheme.benefits or '' }}</textarea>
      <label class="form-label fw-semibold">Objectives (one per line)</label>
      <textarea name="objectives" rows="4" class="form-control">{{ scheme.objectives or '' }}</textarea>
    </div>

    <div class="card-section">
      <h5><i class="bi bi-person-check"></i> Eligibility Criteria</h5>
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Min Age</label>
          <input type="number" name="min_age" class="form-control"
                 value="{{ scheme.min_age or '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Max Age</label>
          <input type="number" name="max_age" class="form-control"
                 value="{{ scheme.max_age or '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Max Income (₹)</label>
          <input type="number" name="max_income" class="form-control"
                 value="{{ scheme.max_income or '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-select">
            <option value="">Any</option>
            {% for g in ["Male","Female","Other"] %}
              <option {% if scheme.gender == g %}selected{% endif %}>{{ g }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Caste</label>
          <select name="caste" class="form-select">
            <option value="">Any</option>
            {% for c in ["General","OBC","SC","ST","Other"] %}
              <option {% if scheme.caste == c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Occupation</label>
          <input type="text" name="occupation" class="form-control"
                 value="{{ scheme.occupation or '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">State</label>
          <input type="text" name="state" class="form-control"
                 value="{{ scheme.state or '' }}">
        </div>
      </div>
    </div>

    <div class="card-section">
      <h5><i class="bi bi-file-earmark-text"></i> Application &amp; Documents</h5>
      <label class="form-label fw-semibold">Application Process (one step per line)</label>
      <textarea name="application_process" rows="4" class="form-control mb-3">{{ scheme.application_process or '' }}</textarea>
      <label class="form-label fw-semibold">Required Documents (one per line)</label>
      <textarea name="documents" rows="4" class="form-control">{{ scheme.documents or '' }}</textarea>
    </div>

    <div class="d-flex gap-3 mt-3 mb-5">
      <button type="submit" class="btn-save">
        <i class="bi bi-cloud-check"></i> Update Scheme
      </button>
      <a href="{{ url_for('admin.admin_dashboard') }}"
         class="btn btn-outline-secondary px-4" style="border-radius:10px;font-weight:600;">
        Cancel
      </a>
    </div>

  </form>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
