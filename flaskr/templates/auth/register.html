<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register - SarkariSahayata</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm p-4">
          <h3 class="mb-3">Register</h3>
          <form id="registerForm" action="#" method="POST">
            <label class="form-label">User Name</label>
            <input name="username" class="form-control mb-3" required>

            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control mb-3" required>

            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control mb-3">

            <button class="btn btn-success w-100">Send OTP & Register</button>
          </form>
        </div>
      </div>
    </div>
    <p class="text-center mt-3"><a href="{{ url_for('index') }}">← Back to homepage</a></p>
  </div>
</body>
</html>
