<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register — SarkariSahayata</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="auth-bg">

<div class="container mt-5" style="max-width:450px;">

    <div class="auth-brand text-center mb-3">
      <h2>Sarkari Sahayata</h2>
      <p>Create your secure account</p>
    </div>

    <div class="auth-steps">
      <div class="step active">Account</div>
      <div class="step">Verification</div>
      <div class="step">Profile</div>
    </div>

    <h5 class="text-center mt-4 mb-3">Create Account</h5>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger small text-center">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" type="text" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input name="email" type="email" class="form-control" required>
      </div>

      <!-- UPDATED PASSWORD FIELD -->
      <div class="auth-field position-relative">
        <i class="bi bi-lock"></i>
        <input id="registerPassword" name="password" type="password" placeholder="Create password" required>

        <i class="bi bi-eye-slash password-toggle"
           onclick="togglePassword('registerPassword', this)"></i>
      </div>

      <button type="submit" class="btn btn-success w-100">
        Continue →
      </button>

    </form>

    <div class="text-center mt-3 small">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Sign In</a>
    </div>

  </div>

  <!-- FIXED HERE -->
  <div class="text-center mt-3">
    <a href="{{ url_for('home.index') }}" class="text-muted small">
      ← Back to homepage
    </a>
  </div>

</div>

<script>
function togglePassword(fieldId, icon) {
    const field = document.getElementById(fieldId);

    if (field.type === "password") {
        field.type = "text";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    } else {
        field.type = "password";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    }
}
</script>

<style>
.password-toggle {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #6c757d;
}
.password-toggle:hover {
    color: #000;
}
</style>

</body>
</html>
