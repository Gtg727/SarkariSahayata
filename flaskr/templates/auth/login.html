<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - SarkariSahayata</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e293b, #020617);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
    }
    .auth-wrapper { width:100%; max-width:420px; color:#e5e7eb; }
    .auth-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      border-radius:16px;
      padding:28px;
      box-shadow:0 25px 60px rgba(0,0,0,0.4);
    }
    .form-control {
      background: rgba(255,255,255,0.08);
      border:none;
      color:#fff;
      padding:12px;
      border-radius:10px;
    }
    .form-control::placeholder { color:#94a3b8; }
    .login-btn {
      width:100%;
      margin-top:12px;
      padding:13px;
      border:none;
      border-radius:999px;
      font-weight:600;
      color:#fff;
      background:linear-gradient(90deg,#f97316,#22c55e);
    }

    .password-toggle {
      position:absolute;
      right:15px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      font-size:18px;
      color:#94a3b8;
    }

    .password-toggle:hover { color:#fff; }
  </style>
</head>

<body>

<div class="auth-wrapper">

  <div class="auth-brand text-center mb-3">
    <h2>SarkariSahayata</h2>
    <p>Smart Government Schemes Portal</p>
  </div>

  <div class="auth-card">

    <h4 class="text-center">Welcome Back</h4>
    <small class="d-block text-center mb-3">Sign in to access your dashboard</small>

    <form method="POST">

      <label class="form-label">Username</label>
      <input name="username" type="text" class="form-control mb-3" placeholder="your username" required>

      <label class="form-label">Password</label>

      <div class="position-relative mb-3">
        <input id="loginPassword" name="password" type="password"
               class="form-control"
               placeholder="enter your password" required>

        <i class="bi bi-eye-slash password-toggle"
           onclick="togglePassword('loginPassword', this)"></i>
      </div>

      <button class="login-btn">
        Sign In Securely →
      </button>
    </form>

    <div class="auth-footer text-center mt-3">
      New to SarkariSahayata?
      <a href="{{ url_for('auth.register') }}">Create Account</a>
    </div>
  </div>

  <a class="back-home d-block text-center mt-3"
     href="{{ url_for('index') }}">← Back to homepage</a>

</div>

<script>
function togglePassword(fieldId, icon) {
    const field = document.getElementById(fieldId);

    if (field.type === "password") {
        field.type = "text";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    } else {
        field.type = "password";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    }
}
</script>

</body>
</html>
