<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - SarkariSahayata</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"">
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm p-4">
          <h3 class="mb-3">Sign in</h3>
          <form id="loginForm" action="#" method="POST">
            <label class="form-label">Username</label>
            <input name="username" type="username" class="form-control mb-3" required>

            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control mb-3" required>
            
            <button class="btn btn-primary w-100">Send OTP & Login</button>
          </form>
        </div>
      </div>
    </div>
    <p class="text-center mt-3"><a href="{{ url_for('index') }}">← Back to homepage</a></p>
  </div>
</body>
</html>
