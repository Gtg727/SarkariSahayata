<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - SarkariSahayata</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e293b, #020617);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
    }
    .auth-wrapper { width:100%; max-width:420px; color:#e5e7eb; }
    .auth-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      border-radius:16px;
      padding:28px;
      box-shadow:0 25px 60px rgba(0,0,0,0.4);
    }
    .form-control {
      background: rgba(255,255,255,0.08);
      border:none;
      color:#fff;
      padding:12px;
      border-radius:10px;
    }
    .form-control::placeholder { color:#94a3b8; }
    .login-btn {
      width:100%;
      margin-top:12px;
      padding:13px;
      border:none;
      border-radius:999px;
      font-weight:600;
      color:#fff;
      background:linear-gradient(90deg,#f97316,#22c55e);
    }
    .back-home {
      display:block;
      text-align:center;
      margin-top:22px;
      font-size:.85rem;
      color:#94a3b8;
      text-decoration:none;
    }
    .back-home:hover { color:#fff; }
  </style>
</head>

<body>

<div class="auth-wrapper">

  <div class="text-center mb-3">
    <h2 class="text-white fw-bold">SarkariSahayata</h2>
    <small class="text-muted">Smart Government Schemes Portal</small>
  </div>

  <div class="auth-card">

    <h4 class="text-center text-white mb-3">Welcome Back</h4>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger small text-center">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- IMPORTANT: remove action="#" -->
    <form method="POST">

      <label class="form-label text-light small">Username</label>
      <input name="username" type="text" class="form-control mb-3" required>

      <label class="form-label text-light small">Password</label>
      <input name="password" type="password" class="form-control mb-3" required>

      <button type="submit" class="login-btn">
        Sign In Securely →
      </button>

    </form>

    <div class="text-center mt-3 small">
      New here?
      <a href="{{ url_for('auth.register') }}" class="text-success">Create Account</a>
    </div>

  </div>

  <!-- FIXED HERE -->
  <a class="back-home" href="{{ url_for('home.index') }}">← Back to homepage</a>

</div>

</body>
</html>
