<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify OTP | SarkariSahayata</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6">
        <div class="card">
          <h3 class="card-title text-center mb-3">Verify OTP</h3>
          <p class="text-center">Enter the OTP sent to <strong>{{ email }}</strong></p>

          <!-- Flash Messages -->
          {% with messages = get_flashed_messages() %}
            {% if messages %}
              <div class="alert alert-info text-center">
                {{ messages[0] }}
              </div>
            {% endif %}
          {% endwith %}

          <form method="POST">
            <div class="mb-3">
              <label for="otp" class="form-label">OTP</label>
              <input type="text" class="form-control" id="otp" name="otp" placeholder="Enter 6-digit OTP" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Verify</button>
          </form>

          <div class="text-center mt-3">
            <a href="{{ url_for('auth.register') }}"><i class="bi bi-arrow-repeat"></i> Resend OTP / Register Again</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
