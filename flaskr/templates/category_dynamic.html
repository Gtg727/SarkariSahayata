<!doctype html>
<html>
<head>
    <title>{{ category }} Schemes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4 text-center">{{ category }} Schemes</h2>

{% if schemes %}
<div class="row">
    {% for scheme in schemes %}
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm h-100">
            <div class="card-body d-flex flex-column">

                <h5 class="fw-bold">{{ scheme.title }}</h5>

                <p class="text-muted small">
                    {{ scheme.description[:150] }}{% if scheme.description|length > 150 %}...{% endif %}
                </p>

                <div class="mt-auto">
                    <a href="{{ url_for('home.scheme_detail', scheme_id=scheme.id) }}"
                       class="btn btn-primary btn-sm">
                        View Full Details
                    </a>
                </div>

            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% else %}
<div class="alert alert-warning text-center">
    No schemes available in this category.
</div>
{% endif %}

<div class="text-center mt-4">
    <a href="{{ url_for('home.index') }}" class="btn btn-outline-dark">
        Back to Home
    </a>
</div>

</div>

</body>
</html>
