<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SarkariSahayata AI</title>

<style>
:root {
  --gov-blue: #1e3a8a;
  --gov-saffron: #f97316;
  --gov-green: #15803d;
  --light-bg: #f8fafc;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Main card */
.chat-wrapper {
  width: 100%;
  max-width: 880px;
  height: 90vh;
  display: flex;
  flex-direction: column;
  background: #ffffff;
  border-radius: 14px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
  overflow: hidden;
}

/* Header */
.chat-header {
  padding: 16px 20px;
  background: linear-gradient(90deg, var(--gov-blue), var(--gov-green));
  color: white;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}

.chat-header span {
  font-size: 13px;
  opacity: 0.9;
  font-weight: 400;
}

/* Chat body */
.chat-body {
  flex: 1;
  padding: 22px;
  overflow-y: auto;
  background: var(--light-bg);
}

/* Messages */
.message {
  max-width: 75%;
  padding: 12px 15px;
  margin-bottom: 14px;
  border-radius: 12px;
  white-space: pre-wrap;
  line-height: 1.5;
  font-size: 15px;
}

.user {
  background: #e0f2fe;
  margin-left: auto;
  border-bottom-right-radius: 4px;
}

.bot {
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-bottom-left-radius: 4px;
}

/* Footer */
.chat-footer {
  display: flex;
  gap: 10px;
  padding: 14px;
  border-top: 1px solid #e5e7eb;
  background: #ffffff;
}

.chat-footer input {
  flex: 1;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  font-size: 15px;
  outline: none;
}

.chat-footer input:focus {
  border-color: var(--gov-blue);
}

/* Buttons */
button {
  padding: 12px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 14px;
}

/* Mic */
#micBtn {
  background: #e5e7eb;
}

#micBtn.listening {
  background: var(--gov-saffron);
  color: white;
}

/* Send */
#sendBtn {
  background: var(--gov-green);
  color: white;
}

#sendBtn:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    🏛️ SarkariSahayata AI
    <span>Official Government Scheme Assistant</span>
  </div>

  <!-- Chat -->
  <div class="chat-body" id="chatBox">
    <div class="message bot">
      Welcome to <b>SarkariSahayata AI</b> 🇮🇳  
      Ask me about government schemes, eligibility, or benefits.
    </div>
  </div>

  <!-- Input -->
  <div class="chat-footer">
    <input id="userInput" placeholder="Type or speak your question…" />
    <button id="micBtn" onclick="toggleMic()">🎤</button>
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
let recognition;
let listening = false;

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = "en-IN";
  recognition.onresult = e => {
    userInput.value = e.results[0][0].transcript;
  };
  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove("listening");
  };
}

function toggleMic() {
  if (!recognition) {
    addMessage(
      "🎤 Voice input is supported on Google Chrome or Microsoft Edge.",
      "bot"
    );
    return;
  }

  listening ? recognition.stop() : recognition.start();
  listening = !listening;
  micBtn.classList.toggle("listening");
}

function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  addMessage(text, "user");
  userInput.value = "";

  fetch("/chatbot/api", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: text })
  })
  .then(r => r.json())
  .then(d => addMessage(d.reply, "bot"));
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `message ${type}`;
  div.innerHTML = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
