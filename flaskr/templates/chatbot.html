<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SarkariSahayata AI</title>

<style>
:root {
  --gov-blue: #1e3a8a;
  --gov-saffron: #f97316;
  --gov-green: #15803d;
  --light-bg: #f8fafc;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat-wrapper {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #ffffff;
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
  overflow: hidden;
}

.chat-header {
  padding: 16px 20px;
  background: linear-gradient(90deg, var(--gov-blue), var(--gov-green));
  color: white;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}

.chat-header span {
  font-size: 13px;
  opacity: 0.9;
  font-weight: 400;
}

.chat-body {
  flex: 1;
  padding: 22px;
  overflow-y: auto;
  background: var(--light-bg);
}

.message {
  max-width: 75%;
  padding: 12px 15px;
  margin-bottom: 14px;
  border-radius: 12px;
  white-space: pre-wrap;
  line-height: 1.5;
  font-size: 15px;
}

.user {
  background: #e0f2fe;
  margin-left: auto;
  border-bottom-right-radius: 4px;
}

.bot {
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-bottom-left-radius: 4px;
}

.chat-footer {
  display: flex;
  gap: 10px;
  padding: 14px;
  border-top: 1px solid #e5e7eb;
  background: #ffffff;
  position: relative;
}

.chat-footer input {
  flex: 1;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  font-size: 15px;
  outline: none;
}

.chat-footer input:focus {
  border-color: var(--gov-blue);
}

button {
  padding: 12px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 14px;
}

#micBtn {
  background: #e5e7eb;
}

#micBtn.listening {
  background: var(--gov-saffron);
  color: white;
}

#sendBtn {
  background: var(--gov-green);
  color: white;
}

#sendBtn:hover {
  opacity: 0.9;
}

/* Suggestions */
.suggestion-box {
  position: absolute;
  bottom: 60px;
  left: 14px;
  right: 14px;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  max-height: 200px;
  overflow-y: auto;
  display: none;
  z-index: 10;
}

.suggestion-item {
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid #f1f1f1;
}

.suggestion-item:hover {
  background: #f3f4f6;
}
</style>
</head>

<body>

<div class="chat-wrapper">

  <div class="chat-header">
    🏛️ SarkariSahayata AI
    <span>Official Government Scheme Assistant</span>
  </div>

  <div class="chat-body" id="chatBox">
    <div class="message bot">
      Welcome to <b>SarkariSahayata AI</b> 🇮🇳<br>
      Ask me about government schemes, eligibility, or benefits.
    </div>
  </div>

  <div class="chat-footer">
    <input id="userInput" placeholder="Type or speak your question…" autocomplete="off" />
    <button id="micBtn" onclick="toggleMic()">🎤</button>
    <button id="sendBtn" onclick="sendMessage()">Send</button>

    <!-- Suggestions -->
    <div id="suggestBox" class="suggestion-box"></div>
  </div>

</div>

<script>
const chatBox = document.getElementById("chatBox");
const userInput = document.getElementById("userInput");
const suggestBox = document.getElementById("suggestBox");
const micBtn = document.getElementById("micBtn");

let recognition;
let listening = false;

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = "en-IN";
  recognition.onresult = e => {
    userInput.value = e.results[0][0].transcript;
    triggerSuggestions();
  };
  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove("listening");
  };
}

function toggleMic() {
  if (!recognition) {
    addMessage("🎤 Voice input works best in Chrome or Edge.", "bot");
    return;
  }

  listening ? recognition.stop() : recognition.start();
  listening = !listening;
  micBtn.classList.toggle("listening");
}

function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  addMessage(text, "user");
  userInput.value = "";
  suggestBox.style.display = "none";

  fetch("/chatbot/api", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: text })
  })
  .then(r => r.json())
  .then(d => addMessage(d.reply, "bot"));
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `message ${type}`;
  div.innerHTML = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* -------------------------
   SUGGESTION SYSTEM
-------------------------- */

userInput.addEventListener("input", triggerSuggestions);

function triggerSuggestions() {
  const text = userInput.value.trim();

  if (text === "") {
    suggestBox.style.display = "none";
    suggestBox.innerHTML = "";
    return;
  }

  fetch("/chatbot/suggest", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text: text })
  })
  .then(r => r.json())
  .then(data => {
    suggestBox.innerHTML = "";

    if (!data.suggestions || data.suggestions.length === 0) {
      suggestBox.style.display = "none";
      return;
    }

    data.suggestions.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerText = item;
      div.onclick = () => {
        userInput.value = item;
        suggestBox.style.display = "none";
      };
      suggestBox.appendChild(div);
    });

    suggestBox.style.display = "block";
  });
}

/* Hide suggestions when clicking outside */
document.addEventListener("click", function(event) {
  if (!event.target.closest(".chat-footer")) {
    suggestBox.style.display = "none";
  }
});

/* Enter key to send */
userInput.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});
</script>

</body>
</html>
