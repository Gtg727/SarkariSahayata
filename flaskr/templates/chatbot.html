<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SarkariSahayata AI Assistant</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f8;
      font-family: "Poppins", Arial, sans-serif;
    }

    .chat-container {
      max-width: 500px;
      margin: 50px auto;
    }

    .chat-card {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .chat-header {
      background: linear-gradient(90deg, #1e64e6, #10b981);
      color: white;
      padding: 15px;
      font-weight: bold;
      text-align: center;
    }

    .chat-body {
      height: 350px;
      overflow-y: auto;
      padding: 15px;
      background: #ffffff;
    }

    .user-msg {
      text-align: right;
      margin-bottom: 10px;
    }

    .bot-msg {
      text-align: left;
      margin-bottom: 10px;
    }

    .user-msg span {
      display: inline-block;
      background: #1e64e6;
      color: white;
      padding: 8px 12px;
      border-radius: 15px 15px 0 15px;
      max-width: 80%;
    }

    .bot-msg span {
      display: inline-block;
      background: #f1f5f9;
      color: #333;
      padding: 8px 12px;
      border-radius: 15px 15px 15px 0;
      max-width: 80%;
    }

    .chat-footer {
      display: flex;
      padding: 10px;
      background: #f9fafb;
    }

    .chat-footer input {
      flex: 1;
      border-radius: 20px;
      padding: 10px;
      border: 1px solid #ddd;
      outline: none;
    }

    .chat-footer button {
      margin-left: 10px;
      border-radius: 20px;
      padding: 10px 20px;
      background: #1e64e6;
      color: white;
      border: none;
    }

    .chat-footer button:hover {
      background: #174bb5;
    }
  </style>
</head>
<body>

<div class="container chat-container">
  <div class="chat-card">
    
    <!-- Header -->
    <div class="chat-header">
      💬 SarkariSahayata AI Assistant
    </div>

    <!-- Chat Body -->
    <div class="chat-body" id="chatBox">
      <div class="bot-msg">
        <span>Hello! I’m your SarkariSahayata assistant. Ask me about schemes, eligibility, or required documents.</span>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-footer">
      <input type="text" id="userInput" placeholder="Type your question here..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>
</div>

<script>
function sendMessage() {
  let input = document.getElementById("userInput");
  let chatBox = document.getElementById("chatBox");

  let message = input.value.trim();
  if (!message) return;

  // Show user message
  let userDiv = document.createElement("div");
  userDiv.className = "user-msg";
  userDiv.innerHTML = `<span>${message}</span>`;
  chatBox.appendChild(userDiv);

  // Send to Flask API
  fetch("/chatbot/api", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: message })
  })
  .then(response => response.json())
  .then(data => {
    let botDiv = document.createElement("div");
    botDiv.className = "bot-msg";
    botDiv.innerHTML = `<span>${data.reply}</span>`;
    chatBox.appendChild(botDiv);

    chatBox.scrollTop = chatBox.scrollHeight;
  });

  input.value = "";
}
</script>

</body>
</html>
