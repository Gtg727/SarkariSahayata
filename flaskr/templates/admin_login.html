<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — SarkariSahayata</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { margin:0; font-family:'Segoe UI',sans-serif; }
    .al-page {
      min-height:100vh;
      background: linear-gradient(135deg,#0f172a 0%,#1e3a8a 60%,#1d4ed8 100%);
      display:flex; align-items:center; justify-content:center;
    }
    .al-card {
      background:#fff; border-radius:20px;
      padding:48px 44px; width:100%; max-width:420px;
      box-shadow:0 30px 80px rgba(0,0,0,.35);
    }
    .al-logo { font-size:28px; font-weight:800; color:#1e3a8a; margin-bottom:4px; }
    .al-sub  { font-size:13px; color:#6b7280; margin-bottom:32px; }
    .al-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:#fef9c3; color:#92400e;
      border:1px solid #fde68a; border-radius:20px;
      padding:4px 12px; font-size:12px; font-weight:600;
      margin-bottom:24px;
    }
    label { font-size:13px; font-weight:600; color:#374151; display:block; margin-bottom:6px; }
    .al-input {
      width:100%; box-sizing:border-box;
      border:1.5px solid #d1d5db; border-radius:10px;
      padding:12px 14px; font-size:14px;
      transition:border .2s; outline:none; margin-bottom:18px;
    }
    .al-input:focus { border-color:#1d4ed8; box-shadow:0 0 0 3px rgba(29,78,216,.1); }
    .al-btn {
      width:100%; background:#1e3a8a; color:#fff;
      border:none; border-radius:10px; padding:13px;
      font-size:15px; font-weight:700; cursor:pointer;
      transition:background .2s;
    }
    .al-btn:hover { background:#162d6b; }
    .al-error {
      background:#fee2e2; border:1px solid #fca5a5;
      color:#b91c1c; border-radius:8px;
      padding:10px 14px; font-size:13px; margin-bottom:18px;
    }
    .al-back {
      display:block; text-align:center; margin-top:18px;
      color:#6b7280; font-size:13px; text-decoration:none;
    }
    .al-back:hover { color:#1e3a8a; }
    .al-lock { font-size:48px; margin-bottom:12px; }
  </style>
</head>
<body>
<div class="al-page">
  <div class="al-card">
    <div class="al-lock">🔐</div>
    <div class="al-logo">SarkariSahayata</div>
    <div class="al-sub">Admin Control Panel</div>
    <div class="al-badge">🛡️ Authorized Access Only</div>

    {% if error %}
    <div class="al-error">⚠️ {{ error }}</div>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="al-error" style="background:#dbeafe;border-color:#93c5fd;color:#1e3a8a;">ℹ️ {{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <label>Admin Username</label>
      <input class="al-input" name="username" placeholder="Enter admin username"
             autocomplete="username" required>

      <label>Password</label>
      <input class="al-input" name="password" type="password"
             placeholder="Enter password"
             autocomplete="current-password" required>

      <button class="al-btn" type="submit">🔓 Login to Admin Panel</button>
    </form>

    <a class="al-back" href="{{ url_for('home.index') }}">← Back to homepage</a>
  </div>
</div>
</body>
</html>
