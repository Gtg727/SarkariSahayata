<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User Details - SarkariSahayata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="card">
        <h2>Add User Details</h2>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-success text-center">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('home.add_details') }}" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" name="age" class="form-control" placeholder="Enter age" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-select" required>
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Income</label>
                <input type="text" name="income" class="form-control" placeholder="Enter annual income" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Caste</label>
                <select name="caste" class="form-select">
                    <option value="">Select Caste</option>
                    <option>General</option>
                    <option>OBC</option>
                    <option>SC</option>
                    <option>ST</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">State</label>
                <input type="text" name="state" class="form-control" placeholder="Enter state" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Occupation</label>
                <input type="textt" name="occupation" class="form-control" placeholder="Enter occupation" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Aadhar Card</label>
                <input type="text" name="aadhar" class="form-control" placeholder="Enter Aadhar no" required>
            </div>
            <div class="mb-3">
                <label class="form-label">PAN Card</label>
                <input type="text" name="pan" class="form-control" placeholder="Enter pan card no" required>
            </div>
            <button type="submit" class="btn btn-submit w-100">Submit</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
